name: Release

on:
  release:
    types: [published]
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-wheels:
    name: Build cp${{ matrix.python-version }} for ${{ matrix.platform.target }} on ${{ matrix.platform.os }}
    runs-on: ${{ matrix.platform.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13', '3.14']
        platform:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            manylinux: '2_28'
            args: --release
          # Native ARM runner (free for public repos since 2025).
          # Builds inside the manylinux_2_28_aarch64 container so the
          # resulting wheel gets the proper ``manylinux_2_28_aarch64``
          # tag.  Cross-compiling this from x86_64 via Zig produces a
          # plain ``linux_aarch64`` tag, which PyPI rejects.
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            manylinux: '2_28'
            args: --release
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            manylinux: ''
            args: --release
          - os: macos-14
            target: aarch64-apple-darwin
            manylinux: ''
            args: --release

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Build wheels (Linux)
        if: runner.os == 'Linux'
        uses: PyO3/maturin-action@v1
        with:
          maturin-version: v1.8.7
          target: ${{ matrix.platform.target }}
          manylinux: ${{ matrix.platform.manylinux }}
          args: ${{ matrix.platform.args }} --interpreter python${{ matrix.python-version }} --out dist

      - name: Build wheels (non-Linux)
        if: runner.os != 'Linux'
        uses: PyO3/maturin-action@v1
        with:
          maturin-version: v1.8.7
          target: ${{ matrix.platform.target }}
          manylinux: ${{ matrix.platform.manylinux }}
          args: ${{ matrix.platform.args }} --interpreter python --out dist

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.platform.target }}-py${{ matrix.python-version }}
          path: dist/
          retention-days: 7

  # ── Android wheel build ─────────────────────────────────────────────
  # Cross-compile to Android via maturin's built-in Android target
  # handling.  Built separately from the desktop matrix because:
  #
  # 1. Only Python 3.13 is supported by Chaquopy's curated index, so
  #    we build only that interpreter version (the one Briefcase
  #    Android ships).
  # 2. NDK + cross-toolchain setup is Android-specific; bundling it
  #    into the desktop matrix would slow + complicate every build.
  # 3. The wheel tags ``android_<api>_<arch>`` are PEP 738; PyPI
  #    started accepting them in late 2024.  Older pip / pip on
  #    desktop ignores them, so they don't pollute desktop installs.
  build-wheels-android:
    name: Build Android wheel for ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Only arm64 and x86_64 — these are the two ABIs that
        # PyO3/maturin-action ships an Android cross-prefix for
        # (``androidPythonTriplet`` map in maturin-action's
        # src/index.ts).  armv7 and x86 aren't in that map, so the
        # action skips its prefix download and maturin's own probe
        # fails.  arm64 covers all modern devices; x86_64 covers
        # emulators.  If armv7/x86 ever become a real need, switch
        # to a hand-rolled NDK + Chaquopy tarball setup for them.
        include:
          - target: aarch64-linux-android
            android_abi: arm64-v8a
          - target: x86_64-linux-android
            android_abi: x86_64
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Set up Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r27c

      - name: Stage Chaquopy Android Python cross-prefix
        # Download the prefix ourselves rather than let maturin-action
        # do it.  Two reasons:
        #
        # 1. maturin-action defaults to python.org's 3.14.3 PEP 738
        #    build, which doesn't match Chaquopy/Briefcase 3.13.
        # 2. Even with ANDROID_PYTHON_VERSION=3.13.7, maturin internally
        #    re-targets PYO3_CROSS_LIB_DIR to ``prefix/lib/python3.13``
        #    (where sysconfig lives) but ``libpython3.13.so`` is one
        #    level up in ``prefix/lib`` — so the linker can't find it.
        #
        # Doing it ourselves lets us pin both PYO3_CROSS_LIB_DIR
        # (sysconfig discovery) AND RUSTFLAGS ``-L native=...``
        # (libpython3.13.so discovery for the linker).
        env:
          PY_VER: '3.13.7'
          TARGET_TRIPLET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          PREFIX_DIR="$RUNNER_TEMP/python-android-$TARGET_TRIPLET"
          mkdir -p "$PREFIX_DIR"
          URL="https://repo.maven.apache.org/maven2/com/chaquo/python/python/${PY_VER}/python-${PY_VER}-${TARGET_TRIPLET}.tar.gz"
          echo "Fetching $URL"
          curl -sSfL "$URL" -o "$PREFIX_DIR/python.tar.gz"
          tar -xzf "$PREFIX_DIR/python.tar.gz" -C "$PREFIX_DIR"
          LIB_DIR="$PREFIX_DIR/prefix/lib"
          test -f "$LIB_DIR/libpython3.13.so" || {
            echo "::error::libpython3.13.so not found at $LIB_DIR"
            ls -la "$LIB_DIR" || true
            exit 1
          }
          echo "PYO3_CROSS_LIB_DIR=$LIB_DIR"     >> "$GITHUB_ENV"
          echo "PYO3_CROSS_PYTHON_VERSION=3.13"  >> "$GITHUB_ENV"
          # Explicit ``-L`` so the linker finds libpython3.13.so even
          # after maturin's internal PYO3_CROSS_LIB_DIR override.
          echo "RUSTFLAGS=-L native=$LIB_DIR"    >> "$GITHUB_ENV"

      - name: Build Android wheel via maturin
        uses: PyO3/maturin-action@v1
        env:
          ANDROID_NDK_ROOT: ${{ steps.setup-ndk.outputs.ndk-path }}
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
          # PYO3_CROSS_LIB_DIR + RUSTFLAGS already in $GITHUB_ENV
          # from the staging step above.  maturin-action's own
          # prefix-download path is guarded by ``if (!PYO3_CROSS_LIB_DIR)``,
          # so it skips when ours is pre-set.
        with:
          maturin-version: v1.9.5
          target: ${{ matrix.target }}
          args: --release --interpreter python3.13 --out dist
          # No manylinux — Android wheels use ``android_X_<abi>``
          # platform tags, not manylinux.
          manylinux: 'off'

      - name: Upload Android wheel
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.target }}-py3.13
          path: dist/
          retention-days: 7

  build-sdist:
    name: Build source distribution
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install maturin
        run: pip install maturin

      - name: Build sdist
        run: maturin sdist --out dist

      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz
          retention-days: 7

  publish-to-pypi:
    name: Publish to PyPI
    # Depends on the Android wheel job too so the GitHub Release
    # has every artifact a downstream consumer (KohakuTerrarium's
    # Android build) needs in one place.  Android wheels go to the
    # GH Release; whether they also publish to PyPI depends on
    # PyPI's PEP 738 enforcement (twine may reject ``android_*``
    # tags on older PyPI configurations — the ``skip-existing``
    # + per-file upload pattern below handles both cases).
    needs: [build-wheels, build-wheels-android, build-sdist]
    runs-on: ubuntu-latest
    if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/v')
    environment:
      name: pypi
      url: https://pypi.org/p/kohakuvault
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: '*'
          merge-multiple: true

      - name: List artifacts
        run: ls -lh dist/

      - name: Upload all wheels + sdist to GitHub Release
        # Includes the Android wheels.  GH Releases is the
        # authoritative download site for KohakuTerrarium's
        # Android build (which fetches via ``--find-links`` into
        # Chaquopy's pip), since PyPI may or may not accept
        # ``android_*`` tags depending on its PEP 738 rollout.
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/*
          fail_on_unmatched_files: false

      - name: Separate Android wheels (keep them off PyPI)
        # Some PyPI configurations still reject ``android_*``
        # platform tags.  Stash them aside before the PyPI publish
        # step + put them back after.  The GH Release upload
        # above already shipped them.
        run: |
          mkdir -p dist-pypi dist-android
          cp dist/*.whl dist-pypi/ 2>/dev/null || true
          cp dist/*.tar.gz dist-pypi/ 2>/dev/null || true
          # Move android-tagged wheels out of the pypi staging.
          for f in dist-pypi/*-linux_android*.whl dist-pypi/*-android_*.whl; do
            [ -e "$f" ] && mv "$f" dist-android/
          done
          echo "PyPI batch:"
          ls -1 dist-pypi/ || true
          echo "Android-only batch (GH Release only):"
          ls -1 dist-android/ || true

      - name: Publish desktop wheels + sdist to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist-pypi
          skip-existing: true
          verbose: true
