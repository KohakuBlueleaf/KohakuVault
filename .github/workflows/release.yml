name: Release

on:
  release:
    types: [published]
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-wheels:
    name: Build cp${{ matrix.python-version }} for ${{ matrix.platform.target }} on ${{ matrix.platform.os }}
    runs-on: ${{ matrix.platform.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13', '3.14']
        platform:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            manylinux: '2_28'
            args: --release
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            manylinux: '2_28'
            args: --release
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            manylinux: ''
            args: --release
          - os: macos-14
            target: aarch64-apple-darwin
            manylinux: ''
            args: --release

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Build wheels (Linux)
        if: runner.os == 'Linux'
        uses: PyO3/maturin-action@v1
        with:
          maturin-version: v1.8.7
          target: ${{ matrix.platform.target }}
          manylinux: ${{ matrix.platform.manylinux }}
          args: ${{ matrix.platform.args }} --interpreter python${{ matrix.python-version }} --out dist

      - name: Build wheels (non-Linux)
        if: runner.os != 'Linux'
        uses: PyO3/maturin-action@v1
        with:
          maturin-version: v1.8.7
          target: ${{ matrix.platform.target }}
          manylinux: ${{ matrix.platform.manylinux }}
          args: ${{ matrix.platform.args }} --interpreter python --out dist

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.platform.target }}-py${{ matrix.python-version }}
          path: dist/
          retention-days: 7

  # ── Android wheel build ─────────────────────────────────────────────
  # Cross-compile to Android via maturin's built-in Android target
  # handling.  Built separately from the desktop matrix because:
  #
  # 1. Only Python 3.13 is supported by Chaquopy's curated index, so
  #    we build only that interpreter version (the one Briefcase
  #    Android ships).
  # 2. NDK + cross-toolchain setup is Android-specific; bundling it
  #    into the desktop matrix would slow + complicate every build.
  # 3. The wheel tags ``android_<api>_<arch>`` are PEP 738; PyPI
  #    started accepting them in late 2024.  Older pip / pip on
  #    desktop ignores them, so they don't pollute desktop installs.
  build-wheels-android:
    name: Build Android wheel for ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Only arm64 and x86_64 — these are the two ABIs that
        # PyO3/maturin-action ships an Android cross-prefix for
        # (``androidPythonTriplet`` map in maturin-action's
        # src/index.ts).  armv7 and x86 aren't in that map, so the
        # action skips its prefix download and maturin's own probe
        # fails.  arm64 covers all modern devices; x86_64 covers
        # emulators.  If armv7/x86 ever become a real need, switch
        # to a hand-rolled NDK + Chaquopy tarball setup for them.
        include:
          - target: aarch64-linux-android
            android_abi: arm64-v8a
          - target: x86_64-linux-android
            android_abi: x86_64
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Set up Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r27c

      - name: Stage Chaquopy Android Python cross-prefix
        # Download the prefix ourselves rather than let maturin-action
        # do it.  Two reasons:
        #
        # 1. maturin-action defaults to python.org's 3.14.3 PEP 738
        #    build, which doesn't match Chaquopy/Briefcase 3.13.
        # 2. Even with ANDROID_PYTHON_VERSION=3.13.7, maturin internally
        #    re-targets PYO3_CROSS_LIB_DIR to ``prefix/lib/python3.13``
        #    (where sysconfig lives) but ``libpython3.13.so`` is one
        #    level up in ``prefix/lib`` — so the linker can't find it.
        #
        # Doing it ourselves lets us pin both PYO3_CROSS_LIB_DIR
        # (sysconfig discovery) AND RUSTFLAGS ``-L native=...``
        # (libpython3.13.so discovery for the linker).
        env:
          PY_VER: '3.13.7'
          TARGET_TRIPLET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          PREFIX_DIR="$RUNNER_TEMP/python-android-$TARGET_TRIPLET"
          mkdir -p "$PREFIX_DIR"
          URL="https://repo.maven.apache.org/maven2/com/chaquo/python/python/${PY_VER}/python-${PY_VER}-${TARGET_TRIPLET}.tar.gz"
          echo "Fetching $URL"
          curl -sSfL "$URL" -o "$PREFIX_DIR/python.tar.gz"
          tar -xzf "$PREFIX_DIR/python.tar.gz" -C "$PREFIX_DIR"
          LIB_DIR="$PREFIX_DIR/prefix/lib"
          test -f "$LIB_DIR/libpython3.13.so" || {
            echo "::error::libpython3.13.so not found at $LIB_DIR"
            ls -la "$LIB_DIR" || true
            exit 1
          }
          echo "PYO3_CROSS_LIB_DIR=$LIB_DIR"     >> "$GITHUB_ENV"
          echo "PYO3_CROSS_PYTHON_VERSION=3.13"  >> "$GITHUB_ENV"
          # Explicit ``-L`` so the linker finds libpython3.13.so even
          # after maturin's internal PYO3_CROSS_LIB_DIR override.
          echo "RUSTFLAGS=-L native=$LIB_DIR"    >> "$GITHUB_ENV"

      - name: Build Android wheel via maturin
        uses: PyO3/maturin-action@v1
        env:
          ANDROID_NDK_ROOT: ${{ steps.setup-ndk.outputs.ndk-path }}
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
          # Tell maturin the Android API level to embed in the wheel
          # platform tag.  Without this, maturin scrapes the build
          # host's kernel and emits garbage tags like
          # ``android_6_12_<kernel>_<arch>`` — silent breakage, not a
          # hard error.  Chaquopy's minSdk floor is 24 (Android 7.0)
          # and matches Chaquopy's own curated index, e.g.
          # ``pyyaml-6.0.3-0-cp313-cp313-android_24_arm64_v8a.whl``.
          ANDROID_API_VERSION: '24'
          # PYO3_CROSS_LIB_DIR + RUSTFLAGS already in $GITHUB_ENV
          # from the staging step above.  maturin-action's own
          # prefix-download path is guarded by ``if (!PYO3_CROSS_LIB_DIR)``,
          # so it skips when ours is pre-set.
        with:
          # >=1.12.4 emits proper PEP 738 ``android_<api>_<abi>`` tags
          # for ``*-linux-android`` Rust targets directly (PR #2992 +
          # #3023).  Older maturin treated those targets as Linux and
          # emitted ``linux_<arch>``, which Chaquopy's pip rejects.
          # 1.11.0 was yanked; 1.12.0-1.12.3 had the fix but were
          # buggy.  v1.13.3 is current latest stable as of 2026-05.
          maturin-version: v1.13.3
          target: ${{ matrix.target }}
          args: --release --interpreter python3.13 --out dist
          # No manylinux — Android wheels use PEP 738 ``android_*``
          # platform tags, not manylinux.
          manylinux: 'off'

      - name: Verify android_24_<abi> wheel produced
        # Sanity check that ANDROID_API_VERSION stuck.  If it didn't,
        # the wheel filename will contain a kernel version instead of
        # ``android_24_*`` and Chaquopy will reject it at install time
        # — fail the build here loudly so we catch it before publish.
        env:
          ABI: ${{ matrix.android_abi }}
        run: |
          set -euo pipefail
          expected_tag="android_24_${ABI//-/_}"
          ls -lh dist/
          test -n "$(ls dist/*-${expected_tag}.whl 2>/dev/null)" || {
              echo "::error::Expected an *${expected_tag}.whl in dist/; got:"
              ls dist/ || true
              exit 1
          }

      - name: Upload Android wheel
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.target }}-py3.13
          path: dist/
          retention-days: 7

  build-sdist:
    name: Build source distribution
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install maturin
        run: pip install maturin

      - name: Build sdist
        run: maturin sdist --out dist

      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz
          retention-days: 7

  publish-to-pypi:
    name: Publish to PyPI
    # Publishes every artifact (desktop wheels, Android wheels, sdist)
    # to BOTH PyPI and the GH Release.  PyPI started accepting PEP 738
    # ``android_<api>_<abi>`` tags via warehouse PR #17559 on
    # 2025-02-10, and maturin >=1.12.4 emits exactly that format.
    needs: [build-wheels, build-wheels-android, build-sdist]
    runs-on: ubuntu-latest
    if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/v')
    environment:
      name: pypi
      url: https://pypi.org/p/kohakuvault
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Download all artifacts
        # PyPI accepts PEP 738 ``android_<api>_<abi>`` platform tags
        # since warehouse PR #17559 (merged 2025-02-10), and maturin
        # 1.12.4+ emits exactly that format for ``*-linux-android``
        # Rust targets.  No more filtering Android wheels out — they
        # ship to both PyPI and the GH Release.
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: '*'
          merge-multiple: true

      - name: List artifacts
        run: ls -lh dist/

      - name: Upload all wheels + sdist to GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/*
          fail_on_unmatched_files: false

      - name: Publish to PyPI (all wheels + sdist)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
          verbose: true
