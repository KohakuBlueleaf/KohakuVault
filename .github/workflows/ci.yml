name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Test Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-14]
        python-version: ['3.10', '3.11', '3.12', '3.13', '3.14']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Install maturin
        run: python -m pip install --upgrade pip maturin

      - name: Build wheel
        run: maturin build --release

      - name: Install built wheel with test dependencies
        shell: bash
        run: |
          pip install target/wheels/*.whl
          pip install pytest pytest-cov pytest-asyncio

      - name: Run tests with coverage
        run: pytest -v --cov=kohakuvault --cov-report=term-missing --cov-report=xml

      - name: Upload coverage to artifacts (Ubuntu only)
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.10'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

      - name: Format check (Python)
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.13'
        run: |
          pip install black==25.11.0
          black --check src/kohakuvault

      - name: Format check (Rust)
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.13'
        run: cargo fmt --check

  test-arm:
    name: Test Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            python-version: '3.12'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Install maturin
        run: python -m pip install --upgrade pip maturin

      - name: Build wheel
        run: maturin build --release

      - name: Install built wheel with test dependencies
        shell: bash
        run: |
          pip install target/wheels/*.whl
          pip install pytest pytest-cov pytest-asyncio

      - name: Run tests
        run: pytest -v

  android-smoke-build:
    # Cross-compile smoke for Android — catches build regressions
    # (NDK incompatibility, Rust dep that doesn't have a target,
    # PyO3 cross-config drift) on every PR so the release.yml's
    # full matrix doesn't surprise us at tag-time.  Only arm64
    # is built here; the release matrix covers all four ABIs.
    name: Android cross-compile smoke (aarch64-linux-android)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Set up Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r27c
      - name: Stage Chaquopy Android Python cross-prefix
        # See release.yml for the full reasoning — we download the
        # Chaquopy 3.13 prefix ourselves so we can set PYO3_CROSS_LIB_DIR
        # AND RUSTFLAGS ``-L`` to the right places.
        env:
          PY_VER: '3.13.7'
          TARGET_TRIPLET: 'aarch64-linux-android'
        run: |
          set -euo pipefail
          PREFIX_DIR="$RUNNER_TEMP/python-android-$TARGET_TRIPLET"
          mkdir -p "$PREFIX_DIR"
          URL="https://repo.maven.apache.org/maven2/com/chaquo/python/python/${PY_VER}/python-${PY_VER}-${TARGET_TRIPLET}.tar.gz"
          curl -sSfL "$URL" -o "$PREFIX_DIR/python.tar.gz"
          tar -xzf "$PREFIX_DIR/python.tar.gz" -C "$PREFIX_DIR"
          LIB_DIR="$PREFIX_DIR/prefix/lib"
          test -f "$LIB_DIR/libpython3.13.so" || {
            echo "::error::libpython3.13.so not found"; ls -la "$LIB_DIR" || true; exit 1;
          }
          echo "PYO3_CROSS_LIB_DIR=$LIB_DIR"    >> "$GITHUB_ENV"
          echo "PYO3_CROSS_PYTHON_VERSION=3.13" >> "$GITHUB_ENV"
          echo "RUSTFLAGS=-L native=$LIB_DIR"   >> "$GITHUB_ENV"
      - name: Cross-compile via maturin
        uses: PyO3/maturin-action@v1
        env:
          ANDROID_NDK_ROOT: ${{ steps.setup-ndk.outputs.ndk-path }}
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
          # Tell maturin the Android API level to embed in the wheel
          # platform tag.  Without this, maturin (1.12.4+) falls back
          # to scraping the build host's kernel version and emits
          # garbage tags like ``android_6_12_<kernel>_aarch64`` — not
          # a hard error, silently broken.  Chaquopy floors at API 24
          # (Android 7.0).
          ANDROID_API_VERSION: '24'
        with:
          # >=1.12.4 emits proper ``android_<api>_<abi>`` PEP 738 tags
          # for the ``*-linux-android`` Rust targets directly; no
          # post-build retag step needed.  v1.13.3 is current latest.
          # 1.11.0 was yanked; 1.12.0-1.12.3 had the fix but were buggy.
          maturin-version: v1.13.3
          target: aarch64-linux-android
          args: --release --interpreter python3.13 --out dist
          manylinux: 'off'
      - name: Verify android_24_arm64_v8a wheel produced
        # Sanity check that the env var stuck — if ANDROID_API_VERSION
        # wasn't picked up, the wheel will have a garbage platform tag
        # and we want to fail loud here, not at downstream Chaquopy
        # install time.
        run: |
          ls -lh dist/
          test -n "$(ls dist/*-android_24_arm64_v8a.whl 2>/dev/null)" || {
              echo "::error::Expected an *android_24_arm64_v8a.whl in dist/; got:"
              ls dist/ || true
              exit 1
          }
