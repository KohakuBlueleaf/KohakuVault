name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Test Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-14]
        python-version: ['3.10', '3.11', '3.12', '3.13', '3.14']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Install maturin
        run: python -m pip install --upgrade pip maturin

      - name: Build wheel
        run: maturin build --release

      - name: Install built wheel with test dependencies
        shell: bash
        run: |
          pip install target/wheels/*.whl
          pip install pytest pytest-cov pytest-asyncio

      - name: Run tests with coverage
        run: pytest -v --cov=kohakuvault --cov-report=term-missing --cov-report=xml

      - name: Upload coverage to artifacts (Ubuntu only)
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.10'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

      - name: Format check (Python)
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.13'
        run: |
          pip install black==25.11.0
          black --check src/kohakuvault

      - name: Format check (Rust)
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.13'
        run: cargo fmt --check

  test-arm:
    name: Test Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            python-version: '3.12'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Install maturin
        run: python -m pip install --upgrade pip maturin

      - name: Build wheel
        run: maturin build --release

      - name: Install built wheel with test dependencies
        shell: bash
        run: |
          pip install target/wheels/*.whl
          pip install pytest pytest-cov pytest-asyncio

      - name: Run tests
        run: pytest -v

  android-smoke-build:
    # Cross-compile smoke for Android — catches build regressions
    # (NDK incompatibility, Rust dep that doesn't have a target,
    # PyO3 cross-config drift) on every PR so the release.yml's
    # full matrix doesn't surprise us at tag-time.  Only arm64
    # is built here; the release matrix covers all four ABIs.
    name: Android cross-compile smoke (aarch64-linux-android)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Set up Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r27c
      - name: Cross-compile via maturin
        uses: PyO3/maturin-action@v1
        env:
          ANDROID_NDK_ROOT: ${{ steps.setup-ndk.outputs.ndk-path }}
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        with:
          maturin-version: v1.8.7
          target: aarch64-linux-android
          args: --release --interpreter python3.13 --out dist
          manylinux: 'off'
      - name: Verify wheel produced
        run: |
          ls -lh dist/
          test -n "$(ls dist/*.whl 2>/dev/null)" || {
              echo "::error::No Android wheel produced"; exit 1;
          }
